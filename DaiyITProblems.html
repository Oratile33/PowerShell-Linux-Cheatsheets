<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15 Essential Daily PowerShell Scripts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --badge-bg: #1f6feb;
    --code-bg: #0d1117;
    --hover: #1c2128;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.25rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1.1rem;
    border-bottom: 1px solid var(--border);
    background: var(--hover);
  }

  .badge {
    background: var(--badge-bg);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    width: 1.7rem;
    height: 1.7rem;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-body {
    padding: 1rem 1.1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
  }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem 0.9rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.65;
    color: #c9d1d9;
    overflow-x: auto;
    flex: 1;
    position: relative;
  }

  .kw  { color: #ff7b72; }   /* keywords */
  .fn  { color: #d2a8ff; }   /* cmdlets */
  .str { color: #a5d6ff; }   /* strings */
  .cm  { color: #8b949e; font-style: italic; } /* comments */
  .num { color: #79c0ff; }   /* numbers */
  .var { color: #ffa657; }   /* variables */
  .op  { color: #f0883e; }   /* operators */

  .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: var(--border);
    border: none;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .copy-btn:hover { background: var(--accent); color: #fff; }
  .copy-btn.copied { background: var(--accent2); color: #fff; }

  footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">// powershell reference</div>
  <h1>15 Essential <span>Daily</span> PowerShell Scripts</h1>
  <p>Click any script to copy it to your clipboard.</p>
</header>

<div class="grid" id="grid"></div>

<footer>Built for Windows Server &amp; Active Directory environments · PS 5.1+</footer>

<script>
const scripts = [
  {
    title: "Check Server Uptime",
    desc: "Get last boot time (uptime) of local or remote server.",
    code: `Get-CimInstance Win32_OperatingSystem |
  Select-Object CSName,
  @{Name="LastBootTime";Expression={$_.LastBootUpTime}}`
  },
  {
    title: "Check Disk Space on Multiple Servers",
    desc: "Check free and total disk space on multiple servers.",
    code: `$Servers = @("Server1","Server2","Server3")
foreach ($Server in $Servers) {
  Get-CimInstance Win32_LogicalDisk -ComputerName $Server \`
    -Filter "DriveType=3" |
  Select-Object PSComputerName,DeviceID,
    @{N="FreeGB";E={[math]::Round($_.FreeSpace/1GB,2)}},
    @{N="TotalGB";E={[math]::Round($_.Size/1GB,2)}}
}`
  },
  {
    title: "Check CPU and Memory Usage",
    desc: "Get real-time CPU and memory usage.",
    code: `Get-Counter '\\Processor(_Total)\\% Processor Time',
         '\\Memory\\Available MBytes'`
  },
  {
    title: "List Stopped Services",
    desc: "List all stopped services.",
    code: `Get-Service |
  Where-Object {$_.Status -eq "Stopped"} |
  Sort-Object DisplayName`
  },
  {
    title: "Restart a Service",
    desc: "Restart any service. Example: Restart-Service -Name 'Spooler'",
    code: `param([string]$ServiceName)
Restart-Service -Name $ServiceName -Force`
  },
  {
    title: "Check Windows Updates Installed Recently",
    desc: "List latest installed Windows updates.",
    code: `Get-HotFix |
  Sort-Object InstalledOn -Descending |
  Select-Object -First 20`
  },
  {
    title: "Get Event Logs (Errors Last 24 Hours)",
    desc: "Fetch error events from System log.",
    code: `Get-WinEvent -FilterHashtable @{
  LogName="System"; Level=2;
  StartTime=(Get-Date).AddDays(-1)
} | Select-Object TimeCreated,Id,ProviderName,Message`
  },
  {
    title: "Test Server Connectivity",
    desc: "Ping multiple servers from a list.",
    code: `$Servers = Get-Content C:\\Servers.txt
foreach ($Server in $Servers) {
  Test-Connection $Server -Count 2 -Quiet
}`
  },
  {
    title: "Check RDP Sessions",
    desc: "Check currently logged-in users on local or remote server.",
    code: `# Local
query

# Remote Server:
query /server:ServerName`
  },
  {
    title: "Get Top 10 Processes by Memory",
    desc: "Show top 10 processes by memory usage.",
    code: `Get-Process |
  Sort-Object WorkingSet -Descending |
  Select-Object -First 10 Name,Id,
    @{N="MemoryMB";E={[math]::Round($_.WorkingSet/1MB,2)}}`
  },
  {
    title: "Check Failed Login Attempts",
    desc: "Check failed login attempts (last 24 hours).",
    code: `Get-WinEvent -FilterHashtable @{
  LogName="Security"; Id=4625;
  StartTime=(Get-Date).AddDays(-1)
}`
  },
  {
    title: "VMware ESXi Host Ping Check",
    desc: "Check connectivity to ESXi hosts.",
    code: `$Hosts = @("esxi01","esxi02","esxi03")
foreach ($Host in $Hosts) {
  Test-Connection $Host -Count 2
}`
  },
  {
    title: "Export AD Users",
    desc: "Export all AD users to CSV.",
    code: `Get-ADUser -Filter * -Properties Department,
  EmailAddress |
  Select-Object Name,SamAccountName,
    Department,EmailAddress |
  Export-Csv C:\\Reports\\ADUsers.csv -NoTypeInformation`
  },
  {
    title: "Find Expiring Passwords",
    desc: "Find users with password older than 60 days.",
    code: `Import-Module ActiveDirectory
Get-ADUser -Filter * -Properties PasswordLastSet |
  Select-Object Name,
    @{N="PasswordAgeDays";E={
      ((Get-Date) - $_.PasswordLastSet).Days
    }} |
  Where-Object {$_.PasswordAgeDays -gt 60} |
  Sort-Object PasswordAgeDays -Descending`
  },
  {
    title: "Daily Server Health Report",
    desc: "Complete snapshot of server health.",
    code: `$Report = @()
$OS  = Get-CimInstance Win32_OperatingSystem
$Svcs = Get-Service | Where-Object {$_.Status -eq "Stopped"}
$Disks = Get-CimInstance Win32_LogicalDisk \`
         -Filter "DriveType=3"

$Report += [PSCustomObject]@{
  Uptime    = $OS.LastBootUpTime
  FreeMemGB = [math]::Round($OS.FreePhysicalMemory/1MB,2)
  Disks     = ($Disks | Select-Object DeviceID,
               @{N="FreeGB";E={
                 [math]::Round($_.FreeSpace/1GB,2)
               }}) -join " | "
}
$StoppedServices = ($Svcs |
  Select-Object -ExpandProperty Name) -join ", "

$Report | Format-List`
  }
];

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlight(code) {
  let s = escHtml(code);
  // comments
  s = s.replace(/(#[^\n]*)/g, '<span class="cm">$1</span>');
  // strings
  s = s.replace(/(&quot;[^&]*?&quot;|'[^']*?')/g, '<span class="str">$1</span>');
  // keywords
  s = s.replace(/\b(param|foreach|if|else|Where-Object|Select-Object|Sort-Object|Import-Module|return|in)\b/g, '<span class="kw">$1</span>');
  // cmdlets
  s = s.replace(/\b(Get-CimInstance|Get-Service|Get-Process|Get-HotFix|Get-WinEvent|Get-Counter|Get-Content|Get-ADUser|Get-Date|Restart-Service|Test-Connection|Export-Csv|Format-List|query)\b/g, '<span class="fn">$1</span>');
  // variables
  s = s.replace(/(\$[\w]+)/g, '<span class="var">$1</span>');
  // numbers
  s = s.replace(/\b(\d+)\b/g, '<span class="num">$1</span>');
  return s;
}

const grid = document.getElementById('grid');
scripts.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="badge">${String(i+1).padStart(2,'0')}</div>
      <div class="card-title">${escHtml(s.title)}</div>
    </div>
    <div class="card-body">
      <p class="desc">${escHtml(s.desc)}</p>
      <pre><button class="copy-btn" data-idx="${i}">copy</button>${highlight(s.code)}</pre>
    </div>`;
  grid.appendChild(card);
});

document.querySelectorAll('.copy-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = +btn.dataset.idx;
    navigator.clipboard.writeText(scripts[idx].code).then(() => {
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
    });
  });
});
</script>
</body>
</html>
